data:
  provider: auto
  local_file: data/sample_prices.csv
  cache_dir: data
  use_cache: true
  adjust: qfq
  interval: 1d

backtest:
  initial_cash: 100000
  commission_bps: 2.0
  slippage_bps: 1.0
  risk_free_rate: 0.02

strategy:
  name: ma
  short_window: 5
  long_window: 20
  max_weight: 1.0

universe:
  cn:
    - symbol: 000001.SZ
      name: 平安银行
    - symbol: 600519.SH
      name: 贵州茅台
  hk:
    - symbol: 0700.HK
      name: 腾讯控股
    - symbol: 9988.HK
      name: 阿里巴巴-W
  us:
    - symbol: AAPL
      name: Apple
    - symbol: MSFT
      name: Microsoft

portfolio:
  top_n: 3
  rebalance_frequency: 5
  weighting: equal
